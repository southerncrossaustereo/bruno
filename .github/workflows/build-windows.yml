name: Build Windows Installer

# Bruno upstream releases manually from a maintainer's machine. This workflow
# lets the southerncrossaustereo fork produce Windows installers from GitHub
# Actions instead — manually on demand via the Actions tab, or automatically
# whenever a `v*` tag is pushed.
#
# The installer is unsigned (electron-builder-config.js sets `win.sign: null`),
# so SmartScreen will warn end-users on first run. That's a separate problem
# — wiring up code signing requires a .pfx cert + password stored as repo
# secrets, which is out of scope here.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45

    # x64 only — SCA doesn't ship Windows arm64. Halves build time and
    # roughly halves artifact size. Read in electron-builder-config.js.
    env:
      BRUNO_BUILD_ARCH: x64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      # Stamp each build with a unique semver. For manual runs we append a
      # prerelease suffix derived from github.run_number (monotonic per
      # workflow), so installer filenames don't collide in users' Downloads.
      # For v* tag pushes we trust the tag — strip the leading `v`.
      - name: Compute build version
        id: ver
        shell: bash
        run: |
          BASE=$(node -p "require('./packages/bruno-electron/package.json').version")
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${BASE}-sca.${{ github.run_number }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          {
            echo "### Build version"
            echo ""
            echo "\`$VERSION\`  (commit \`${GITHUB_SHA::7}\`)"
          } >> "$GITHUB_STEP_SUMMARY"

      # electron-builder reads the version from packages/bruno-electron/package.json,
      # and the artifactName template (`${name}_${version}_${arch}_win.${ext}`)
      # bakes that version into the installer filename. So we just bump it in
      # place — no git commit, no upstream churn.
      - name: Apply build version
        shell: bash
        run: |
          cd packages/bruno-electron
          npm version "${{ steps.ver.outputs.version }}" --no-git-tag-version --allow-same-version

      # `setup` does: npm install + build every subordinate workspace package
      # + bundle the JS sandbox libraries. It does NOT build bruno-app, which
      # is the React frontend — that's a separate step before electron pack.
      - name: Install and build workspace packages
        run: npm run setup

      - name: Build web frontend (bruno-app)
        run: npm run build:web

      # build:electron copies the web build into packages/bruno-electron/web
      # and then runs `npm run dist:<host-os>` — on windows-latest that's
      # `dist:win`. With BRUNO_BUILD_ARCH=x64 set above, only x64 is built.
      - name: Build Electron installer
        run: npm run build:electron

      - name: Upload installer artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: bruno-windows-installer-${{ steps.ver.outputs.version }}
          path: |
            packages/bruno-electron/out/*.exe
            packages/bruno-electron/out/*.exe.blockmap
          retention-days: 30
          if-no-files-found: error

      # Keep storage tidy — only the latest Windows installer is useful, and
      # GitHub bills artifact storage by GB-month. After a successful upload,
      # delete every prior bruno-windows-installer-* artifact in the repo.
      # Failures here don't fail the build.
      - name: Delete prior Windows installer artifacts
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const keep = `bruno-windows-installer-${{ steps.ver.outputs.version }}`;
            const { data } = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            let deleted = 0;
            for (const a of data.artifacts) {
              if (a.name.startsWith('bruno-windows-installer-') && a.name !== keep) {
                try {
                  await github.rest.actions.deleteArtifact({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    artifact_id: a.id
                  });
                  core.info(`Deleted ${a.name} (${a.id})`);
                  deleted++;
                } catch (err) {
                  core.warning(`Could not delete ${a.name}: ${err.message}`);
                }
              }
            }
            core.summary.addHeading('Artifact cleanup', 3).addRaw(`Kept \`${keep}\`, deleted ${deleted} prior installer artifact(s).`).write();
